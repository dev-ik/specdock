<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640" role="img" aria-labelledby="title desc">
  <title id="title">SpecDock product preview</title>
  <desc id="desc">A preview of the SpecDock local-first API contract workspace with import, explorer, request, response, and SDK generation panels.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset="0.58" stop-color="#eef6ff"/>
      <stop offset="1" stop-color="#f5fbf7"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#f8fafc"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#0f172a" flood-opacity="0.16"/>
    </filter>
  </defs>
  <rect width="1280" height="640" fill="url(#bg)"/>
  <rect x="72" y="72" width="1136" height="496" rx="22" fill="#0f172a" filter="url(#shadow)"/>
  <rect x="88" y="88" width="1104" height="464" rx="14" fill="#f8fafc"/>
  <rect x="88" y="88" width="1104" height="58" rx="14" fill="#111827"/>
  <circle cx="122" cy="117" r="7" fill="#fb7185"/>
  <circle cx="148" cy="117" r="7" fill="#fbbf24"/>
  <circle cx="174" cy="117" r="7" fill="#34d399"/>
  <text x="214" y="125" font-family="Inter, Arial, sans-serif" font-size="23" font-weight="700" fill="#ffffff">SpecDock</text>
  <text x="338" y="125" font-family="Inter, Arial, sans-serif" font-size="15" fill="#cbd5e1">Local-first API contract workspace</text>

  <g transform="translate(116 178)">
    <rect width="214" height="314" rx="10" fill="url(#panel)" stroke="#dbe3ee"/>
    <text x="22" y="40" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700" fill="#0f172a">Import</text>
    <rect x="20" y="62" width="174" height="38" rx="7" fill="#e0f2fe" stroke="#bae6fd"/>
    <text x="36" y="86" font-family="Inter, Arial, sans-serif" font-size="13" fill="#075985">OpenAPI 3.0 / 3.1</text>
    <rect x="20" y="120" width="174" height="64" rx="8" fill="#ffffff" stroke="#dbe3ee"/>
    <path d="M42 145h130M42 164h94" stroke="#94a3b8" stroke-width="6" stroke-linecap="round"/>
    <rect x="20" y="208" width="78" height="34" rx="7" fill="#111827"/>
    <text x="39" y="230" font-family="Inter, Arial, sans-serif" font-size="12" fill="#ffffff">File</text>
    <rect x="110" y="208" width="84" height="34" rx="7" fill="#f1f5f9" stroke="#dbe3ee"/>
    <text x="136" y="230" font-family="Inter, Arial, sans-serif" font-size="12" fill="#334155">URL</text>
    <text x="22" y="282" font-family="Inter, Arial, sans-serif" font-size="13" fill="#64748b">Browser storage only</text>
  </g>

  <g transform="translate(356 178)">
    <rect width="248" height="314" rx="10" fill="url(#panel)" stroke="#dbe3ee"/>
    <text x="22" y="40" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700" fill="#0f172a">Explore</text>
    <rect x="20" y="62" width="208" height="34" rx="7" fill="#ffffff" stroke="#dbe3ee"/>
    <text x="38" y="84" font-family="Inter, Arial, sans-serif" font-size="12" fill="#64748b">Search endpoints</text>
    <g font-family="Inter, Arial, sans-serif" font-size="13" font-weight="700">
      <rect x="20" y="118" width="208" height="34" rx="7" fill="#ecfdf5" stroke="#bbf7d0"/>
      <text x="34" y="140" fill="#047857">GET</text>
      <text x="78" y="140" fill="#0f172a">/posts</text>
      <rect x="20" y="164" width="208" height="34" rx="7" fill="#eff6ff" stroke="#bfdbfe"/>
      <text x="34" y="186" fill="#1d4ed8">GET</text>
      <text x="78" y="186" fill="#0f172a">/posts/{id}</text>
      <rect x="20" y="210" width="208" height="34" rx="7" fill="#fff7ed" stroke="#fed7aa"/>
      <text x="34" y="232" fill="#c2410c">POST</text>
      <text x="84" y="232" fill="#0f172a">/posts</text>
    </g>
    <text x="22" y="282" font-family="Inter, Arial, sans-serif" font-size="13" fill="#64748b">Quality and diff panels</text>
  </g>

  <g transform="translate(630 178)">
    <rect width="248" height="314" rx="10" fill="url(#panel)" stroke="#dbe3ee"/>
    <text x="22" y="40" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700" fill="#0f172a">Test</text>
    <rect x="20" y="62" width="208" height="38" rx="7" fill="#ffffff" stroke="#dbe3ee"/>
    <text x="36" y="86" font-family="Inter, Arial, sans-serif" font-size="13" fill="#0f172a">Base URL</text>
    <rect x="20" y="118" width="90" height="34" rx="7" fill="#111827"/>
    <text x="42" y="140" font-family="Inter, Arial, sans-serif" font-size="12" fill="#ffffff">Direct</text>
    <rect x="122" y="118" width="106" height="34" rx="7" fill="#f1f5f9" stroke="#dbe3ee"/>
    <text x="156" y="140" font-family="Inter, Arial, sans-serif" font-size="12" fill="#334155">Proxy</text>
    <rect x="20" y="172" width="208" height="86" rx="8" fill="#0f172a"/>
    <text x="36" y="200" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12" fill="#bae6fd">curl -X GET</text>
    <text x="36" y="222" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12" fill="#bbf7d0">https://api.example</text>
    <text x="22" y="282" font-family="Inter, Arial, sans-serif" font-size="13" fill="#64748b">Auth profiles stay local</text>
  </g>

  <g transform="translate(904 178)">
    <rect width="248" height="314" rx="10" fill="url(#panel)" stroke="#dbe3ee"/>
    <text x="22" y="40" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700" fill="#0f172a">Generate</text>
    <g font-family="Inter, Arial, sans-serif" font-size="13" fill="#0f172a">
      <rect x="20" y="62" width="94" height="34" rx="7" fill="#eef2ff" stroke="#c7d2fe"/>
      <text x="48" y="84">TS</text>
      <rect x="132" y="62" width="96" height="34" rx="7" fill="#f0fdf4" stroke="#bbf7d0"/>
      <text x="163" y="84">Go</text>
      <rect x="20" y="114" width="94" height="34" rx="7" fill="#fff7ed" stroke="#fed7aa"/>
      <text x="44" y="136">Java</text>
      <rect x="132" y="114" width="96" height="34" rx="7" fill="#fdf2f8" stroke="#fbcfe8"/>
      <text x="162" y="136">PHP</text>
    </g>
    <rect x="20" y="172" width="208" height="74" rx="8" fill="#ffffff" stroke="#dbe3ee"/>
    <path d="M42 196h148M42 218h116" stroke="#94a3b8" stroke-width="6" stroke-linecap="round"/>
    <text x="22" y="282" font-family="Inter, Arial, sans-serif" font-size="13" fill="#64748b">SDK ZIP downloads</text>
  </g>

  <text x="116" y="536" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700" fill="#0f172a">Import -> Explore -> Test -> Generate</text>
  <text x="454" y="536" font-family="Inter, Arial, sans-serif" font-size="16" fill="#475569">OpenAPI-first, self-hosted, security-first developer tooling.</text>
</svg>
