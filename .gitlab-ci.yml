image: node:20.19.0

stages:
  - verify

cache:
  key:
    files:
      - package-lock.json
  paths:
    - .npm/

verify:
  stage: verify
  script:
    - npm ci --cache .npm --prefer-offline
    - npm run lint
    - npm run typecheck
    - npm run test
    - npm run build
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "main"'
