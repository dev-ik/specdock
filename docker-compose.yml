services:
  specdock:
    build: .
    container_name: specdock
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      WEB_DIST_DIR: /app/apps/web/dist
      PUBLIC_DEMO: "true"
      PROXY_ENABLED: "false"
      PROXY_ALLOWED_HOSTS: ""
      PROXY_ALLOW_PRIVATE_TARGETS: "false"
      TRUST_PROXY: "false"
