openapi: 3.0.3
info:
  title: SpecDock Demo API
  version: 0.1.0
  description: A small CORS-friendly contract for import, explorer, request, response, and SDK generation smoke tests.
servers:
  - url: https://dummyjson.com
    description: Public DummyJSON API
tags:
  - name: Posts
  - name: Comments
paths:
  /posts:
    get:
      tags:
        - Posts
      operationId: listPosts
      summary: List posts
      description: Returns demo posts from DummyJSON.
      parameters:
        - name: limit
          in: query
          required: false
          example: 5
          schema:
            type: integer
            minimum: 1
            maximum: 30
      responses:
        "200":
          description: Posts
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PostList"
  /posts/{id}:
    get:
      tags:
        - Posts
      operationId: getPost
      summary: Get post
      description: Returns one demo post by id.
      parameters:
        - name: id
          in: path
          required: true
          example: 1
          schema:
            type: integer
      responses:
        "200":
          description: Post
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Post"
        "404":
          description: Post not found
  /posts/{id}/comments:
    get:
      tags:
        - Comments
      operationId: listPostComments
      summary: List post comments
      description: Returns comments for one demo post.
      parameters:
        - name: id
          in: path
          required: true
          example: 1
          schema:
            type: integer
      responses:
        "200":
          description: Comments
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommentList"
  /posts/add:
    post:
      tags:
        - Posts
      operationId: createPost
      summary: Create post
      description: Simulates creating a post. DummyJSON returns a created response but does not persist it.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePostRequest"
            example:
              title: SpecDock smoke test
              body: Generated from the request builder.
              userId: 1
      responses:
        "201":
          description: Post created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Post"
components:
  schemas:
    PostList:
      type: object
      required:
        - posts
        - total
        - skip
        - limit
      properties:
        posts:
          type: array
          items:
            $ref: "#/components/schemas/Post"
        total:
          type: integer
        skip:
          type: integer
        limit:
          type: integer
    Post:
      type: object
      required:
        - id
        - title
        - body
        - userId
      properties:
        id:
          type: integer
        title:
          type: string
        body:
          type: string
        userId:
          type: integer
        tags:
          type: array
          items:
            type: string
        views:
          type: integer
    CommentList:
      type: object
      required:
        - comments
        - total
        - skip
        - limit
      properties:
        comments:
          type: array
          items:
            $ref: "#/components/schemas/Comment"
        total:
          type: integer
        skip:
          type: integer
        limit:
          type: integer
    Comment:
      type: object
      required:
        - id
        - body
        - postId
      properties:
        id:
          type: integer
        body:
          type: string
        postId:
          type: integer
        likes:
          type: integer
    CreatePostRequest:
      type: object
      required:
        - title
        - body
        - userId
      properties:
        title:
          type: string
        body:
          type: string
        userId:
          type: integer
