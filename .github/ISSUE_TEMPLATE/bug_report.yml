name: Bug report
description: Report something that is broken or behaves unexpectedly.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please avoid sharing secrets, API keys,
        auth headers, cookies, request bodies, or private response bodies.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong?
      placeholder: Importing an OpenAPI spec from URL fails with...
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List the smallest set of steps that reproduces the issue.
      placeholder: |
        1. Open SpecDock
        2. Import ...
        3. Click ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What happened instead?
    validations:
      required: true
  - type: dropdown
    id: environment
    attributes:
      label: Environment
      options:
        - Hosted demo
        - Local development
        - Docker
        - Self-hosted deployment
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: SpecDock version
      description: Use the release tag, Docker image tag, or commit SHA if known.
      placeholder: v0.2.3
  - type: input
    id: browser
    attributes:
      label: Browser and OS
      placeholder: Chrome 126 on macOS
  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Paste relevant logs or screenshots. Redact sensitive values first.
  - type: checkboxes
    id: checks
    attributes:
      label: Checklist
      options:
        - label: I have removed secrets, tokens, cookies, auth headers, request bodies, and private response bodies.
          required: true
        - label: I searched existing issues before opening this report.
          required: true
